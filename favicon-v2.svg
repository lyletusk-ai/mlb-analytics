<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="ballGlow6h" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#6fd3f5" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#3aa0c4" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6fd3f5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ballFill6h" cx="38%" cy="32%" r="60%">
      <stop offset="0%"  stop-color="#cdf2ff" stop-opacity="0.50"/>
      <stop offset="60%" stop-color="#1e6680" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#0a1a25" stop-opacity="0.85"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="12" fill="#0a0f1c"/>
  <circle cx="32" cy="32" r="28" fill="url(#ballGlow6h)"/>
  <!-- Chromatic split outline -->
  <circle cx="33.5" cy="32" r="22" fill="none" stroke="#ff5dd2" stroke-width="0.8" opacity="0.55"/>
  <circle cx="30.5" cy="32" r="22" fill="none" stroke="#6fd3f5" stroke-width="0.8" opacity="0.75"/>
  <circle cx="32" cy="32" r="22" fill="url(#ballFill6h)"/>
  <circle cx="32" cy="32" r="22" fill="none" stroke="#cdf2ff" stroke-width="0.7"/>
  <!-- Baseball seam curves — bright red (real baseball stitching) with cyan glow under -->
  <g fill="none" stroke-linecap="round">
    <!-- Glow underlay -->
    <path d="M 15 21 Q 23 32 15 43" stroke="#ff8888" stroke-width="3.2" opacity="0.45"/>
    <path d="M 49 21 Q 41 32 49 43" stroke="#ff8888" stroke-width="3.2" opacity="0.45"/>
    <!-- Main seam line -->
    <path d="M 15 21 Q 23 32 15 43" stroke="#d96b6b" stroke-width="1.5"/>
    <path d="M 49 21 Q 41 32 49 43" stroke="#d96b6b" stroke-width="1.5"/>
  </g>
  <!-- Detailed double-pair stitches — real baseballs have stitches in pairs along the seam -->
  <g stroke="#ff8a8a" stroke-width="0.7" stroke-linecap="round" opacity="0.95">
    <!-- Left seam, top to bottom, double-pair pattern -->
    <line x1="13" y1="23" x2="17" y2="24"/>
    <line x1="13.5" y1="25" x2="17.5" y2="26"/>
    <line x1="12" y1="27" x2="16" y2="28"/>
    <line x1="12.5" y1="29" x2="16.5" y2="30"/>
    <line x1="11.5" y1="31" x2="15.5" y2="32"/>
    <line x1="11.5" y1="33" x2="15.5" y2="32"/>
    <line x1="12" y1="35" x2="16" y2="34"/>
    <line x1="12.5" y1="37" x2="16.5" y2="36"/>
    <line x1="13" y1="39" x2="17" y2="38"/>
    <line x1="13.5" y1="41" x2="17.5" y2="40"/>
    <!-- Right seam mirror -->
    <line x1="51" y1="23" x2="47" y2="24"/>
    <line x1="50.5" y1="25" x2="46.5" y2="26"/>
    <line x1="52" y1="27" x2="48" y2="28"/>
    <line x1="51.5" y1="29" x2="47.5" y2="30"/>
    <line x1="52.5" y1="31" x2="48.5" y2="32"/>
    <line x1="52.5" y1="33" x2="48.5" y2="32"/>
    <line x1="52" y1="35" x2="48" y2="34"/>
    <line x1="51.5" y1="37" x2="47.5" y2="36"/>
    <line x1="51" y1="39" x2="47" y2="38"/>
    <line x1="50.5" y1="41" x2="46.5" y2="40"/>
  </g>
  <!-- Specular highlight -->
  <circle cx="24" cy="22" r="3" fill="#ffffff" opacity="0.3"/>
</svg>
