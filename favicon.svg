<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dark navy background, rounded corners -->
  <rect width="64" height="64" rx="12" fill="#0a0f1c"/>
  <!-- Constellation web — baseball diamond pattern echoing the app's
       four role clusters. Lines connect the four bases, dot at center. -->
  <g stroke="#6fd3f5" stroke-width="1.6" opacity="0.55" fill="none">
    <line x1="32" y1="13" x2="51" y2="32"/>
    <line x1="51" y1="32" x2="32" y2="51"/>
    <line x1="32" y1="51" x2="13" y2="32"/>
    <line x1="13" y1="32" x2="32" y2="13"/>
    <line x1="32" y1="13" x2="32" y2="51" opacity="0.3"/>
    <line x1="13" y1="32" x2="51" y2="32" opacity="0.3"/>
  </g>
  <!-- Four corner dots — colors mirror the role clusters in the constellation:
       SP cyan / RP yellow / OF orange / IF green -->
  <circle cx="32" cy="13" r="5.5" fill="#6fd3f5"/>
  <circle cx="51" cy="32" r="5.5" fill="#facc15"/>
  <circle cx="32" cy="51" r="5.5" fill="#fb923c"/>
  <circle cx="13" cy="32" r="5.5" fill="#7ea870"/>
  <!-- Center star: the indexed player. Tan accent matches the AI/About chip color. -->
  <circle cx="32" cy="32" r="3.5" fill="#d4a574"/>
  <!-- Outer glow ring for the center, very faint -->
  <circle cx="32" cy="32" r="5.5" fill="none" stroke="#d4a574" stroke-width="1" opacity="0.35"/>
</svg>
